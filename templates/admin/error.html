{% extends "admin/_base.html" %}
{% block title %}{{ title }} · Anchor Metrics{% endblock %}
{% block content %}
<section class="bg-white rounded-xl shadow p-10 text-center max-w-xl mx-auto mt-12">
  <div class="text-6xl font-bold brand-primary-text mb-2">{{ code }}</div>
  <h1 class="text-xl font-semibold text-slate-700 mb-3">{{ title }}</h1>
  <p class="text-slate-600 mb-6">{{ message }}</p>
  <a href="{{ url_for('home') if session.authed else url_for('login') }}"
     class="inline-block brand-primary text-white font-medium px-5 py-2.5 rounded-lg hover:opacity-90">
    {{ 'Back to dashboard' if session.authed else 'Sign in' }}
  </a>
</section>
{% endblock %}
