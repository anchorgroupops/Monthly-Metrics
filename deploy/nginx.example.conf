# Drop-in nginx snippet for serving the dashboard at
# https://anchor.joelycannoli.com/metrics/
#
# Place inside the existing `server { listen 443 ssl; server_name
# anchor.joelycannoli.com; ... }` block, then `nginx -t && systemctl reload
# nginx`.
#
# Pair with:
#   WEB_BASE_PATH=/metrics
#   WEB_BASE_URL=https://anchor.joelycannoli.com/metrics
# in /etc/monthly-metrics.env so the FastAPI app mounts its router at /metrics.
#
# IMPORTANT: `proxy_pass` has NO trailing slash — we want nginx to pass the
# full path (/metrics/login) through unmodified. The FastAPI router is mounted
# at /metrics so it matches.

location /metrics {
    proxy_pass http://127.0.0.1:8081;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
